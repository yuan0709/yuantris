<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Tetris Battle PRO - Ultimate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="main-layout">
            <div class="player-section">
                <h3>PLAYER</h3>
                <div class="game-wrapper">
                    <div class="side-boxes left">
                        <div class="box">HOLD<canvas id="hold-canvas" width="90" height="90"></canvas></div>
                    </div>
                    <div class="canvas-container">
                        <div id="player-garbage-bar" class="garbage-bar"></div>
                        <canvas id="tetris" width="300" height="600"></canvas>
                    </div>
                    <div class="side-boxes right">
                        <div class="box">NEXT<canvas id="next-canvas" width="90" height="270"></canvas></div>
                    </div>
                </div>
            </div>

            <div class="side-panel">
                <button id="start-btn">START GAME</button>
                <div class="control-group">
                    <label>AI 難度 (0-10):</label>
                    <input type="number" id="ai-level" value="8" min="0" max="10">
                </div>
                <div class="control-group">
                    <label>DAS (延遲 ms):</label>
                    <input type="number" id="das-input" value="150">
                </div>
                <div class="control-group">
                    <label>ARR (連移 ms):</label>
                    <input type="number" id="arr-input" value="30">
                </div>
                <div class="stats">
                    <p>已送出攻擊: <span id="p-sent">0</span></p>
                    <p>AI 送出: <span id="a-sent">0</span></p>
                </div>
                <div class="hint">
                    移動: 方向鍵 / WASD<br>
                    旋轉: ↑ / W / X<br>
                    硬降: 空白鍵<br>
                    暫存: C / Shift
                </div>
            </div>

            <div class="player-section">
                <h3>AI BOT</h3>
                <div class="game-wrapper">
                    <div class="canvas-container">
                        <div id="ai-garbage-bar" class="garbage-bar"></div>
                        <canvas id="ai-tetris" width="300" height="600"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
